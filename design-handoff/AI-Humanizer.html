<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Humanizer — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(120% 120% at 50% 0%, #ececf1 0%, #dcdce3 60%, #d2d2da 100%);
    font-family: -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100%; }

  /* ── Light theme tokens ── */
  [data-theme="light"] {
    --bg: #F4F4F7;
    --surface: #FFFFFF;
    --surface-2: #F0F0F4;
    --text: #1A1A1F;
    --text-muted: #6B6B77;
    --text-faint: #A2A2AE;
    --border: rgba(0,0,0,0.075);
    --border-strong: rgba(0,0,0,0.18);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.03);
    --tabbar-bg: rgba(255,255,255,0.82);
    --risk-red: #E5484D;   --risk-red-bg: #FCEBEC;
    --risk-amber: #C7820C; --risk-amber-bg: #FAF1DF;
    --risk-green: #2F9E68; --risk-green-bg: #E7F5EE;
    --accent-soft: color-mix(in srgb, var(--accent) 11%, #fff 0%);
    --accent-glow: color-mix(in srgb, var(--accent) 28%, transparent);
  }
  /* ── Dark theme tokens ── */
  [data-theme="dark"] {
    --bg: #0E0E12;
    --surface: #18181D;
    --surface-2: #25252C;
    --text: #F3F3F6;
    --text-muted: #9696A2;
    --text-faint: #5E5E68;
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.24);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
    --tabbar-bg: rgba(18,18,22,0.8);
    --risk-red: #FF6166;   --risk-red-bg: rgba(229,72,77,.16);
    --risk-amber: #E0A33A; --risk-amber-bg: rgba(216,135,11,.17);
    --risk-green: #3DBE83; --risk-green-bg: rgba(47,158,104,.17);
    --accent-soft: color-mix(in srgb, var(--accent) 24%, transparent);
    --accent-glow: color-mix(in srgb, var(--accent) 40%, transparent);
  }
  [data-theme] {
    --r-lg: 18px;
    --r-md: 13px;
  }

  textarea::placeholder { color: var(--text-faint); }
  textarea, button { font-family: var(--font-ui, inherit); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes screenFade {
    from { transform: translateY(8px); }
    to   { transform: translateY(0); }
  }
  .screen-fade { animation: screenFade .34s cubic-bezier(.32,.72,0,1); }

  /* tidy scrollbars inside the phone */
  [data-scroll]::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/screens-core.jsx"></script>
  <script type="text/babel" src="app/screens-flow.jsx"></script>
  <script type="text/babel" src="app/screens-aux.jsx"></script>
  <script type="text/babel" src="app/app-main.jsx"></script>
</body>
</html>
